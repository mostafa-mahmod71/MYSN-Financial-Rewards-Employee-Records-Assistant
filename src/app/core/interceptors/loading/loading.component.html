@if (loadings.isLoading()) {
  <div class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/40 backdrop-blur-sm">
    <div class="flex flex-col items-center gap-4">
      <!-- شكل Spinner شيك بالـ Tailwind -->
      <div class="w-16 h-16 border-4 border-cyan-400/20 border-t-cyan-500 rounded-full animate-spin"></div>
      <p class="text-cyan-400 font-bold animate-pulse text-lg">جاري تحميل البيانات...</p>
    </div>
  </div>
}
